name: DB Backup → S3

on:
  schedule:
    # Cada día a las 07:00 UTC = 01:00 AM hora Ciudad de México (CST)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub Actions

jobs:
  backup:
    name: Dump Railway DB → entregax-uploads/db-backups/
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Forzar Node.js 24 para acciones que aún declaran Node 20 (deprecado jun/2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Instalar cliente PostgreSQL 17 (coincide con Railway)
        run: |
          set -e
          # Remover el cliente v16 preinstalado de Ubuntu para evitar conflicto
          sudo apt-get remove -y postgresql-client-16 postgresql-client-common || true

          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

          # Asegurar que el binario v17 sea el primero en PATH
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Generar dump completo y comprimido
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          set -uo pipefail

          # Validar que el secret exista
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "❌ Secret RAILWAY_DATABASE_URL está vacío o no configurado"
            exit 1
          fi
          echo "DATABASE_URL length: ${#DATABASE_URL} chars"
          echo "DATABASE_URL scheme: $(echo "$DATABASE_URL" | grep -oE '^[a-z]+://' || echo 'INVALID')"

          # Probar conectividad
          echo "--- Probando conexión ---"
          psql "$DATABASE_URL" -c "SELECT version();" || {
            echo "❌ No se pudo conectar a la base de datos"
            exit 1
          }

          FILENAME="entregax_$(date +'%Y-%m-%d').sql.gz"
          DUMPFILE="entregax_$(date +'%Y-%m-%d').sql"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

          echo "--- pg_dump version ---"
          pg_dump --version

          echo "--- Ejecutando pg_dump (stderr visible) ---"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --quote-all-identifiers \
            -f "$DUMPFILE"
          PG_EXIT=$?
          echo "pg_dump exit code: $PG_EXIT"

          if [ "$PG_EXIT" -ne 0 ]; then
            echo "❌ pg_dump falló con exit $PG_EXIT"
            exit 1
          fi

          if [ ! -s "$DUMPFILE" ]; then
            echo "❌ Dump vacío o inexistente"
            ls -la "$DUMPFILE" || true
            exit 1
          fi

          DUMP_SIZE=$(stat -c%s "$DUMPFILE")
          echo "Tamaño SQL sin comprimir: $(du -sh "$DUMPFILE" | cut -f1) ($DUMP_SIZE bytes)"

          gzip -f "$DUMPFILE"
          SIZE_BYTES=$(stat -c%s "$FILENAME")
          SIZE_HUMAN=$(du -sh "$FILENAME" | cut -f1)
          echo "Tamaño comprimido: $SIZE_HUMAN ($SIZE_BYTES bytes)"

          if [ "$SIZE_BYTES" -lt 102400 ]; then
            echo "❌ Backup demasiado pequeño (<100KB)"
            exit 1
          fi

          if ! gunzip -t "$FILENAME"; then
            echo "❌ Archivo gzip corrupto"
            exit 1
          fi

          TABLE_COUNT=$(gunzip -c "$FILENAME" | grep -cE "^CREATE TABLE")
          echo "Tablas en el dump: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 5 ]; then
            echo "❌ Dump tiene muy pocas tablas ($TABLE_COUNT)"
            exit 1
          fi
          echo "✅ Dump válido con $TABLE_COUNT tablas"

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Subir backup a S3
        run: |
          aws s3 cp "$FILENAME" "s3://entregax-uploads/db-backups/$FILENAME"
          echo "✅ Backup subido: s3://entregax-uploads/db-backups/$FILENAME"

      - name: Limpiar backups con más de 30 días
        run: |
          CUTOFF=$(date -d '30 days ago' +'%Y-%m-%d' 2>/dev/null || date -v-30d +'%Y-%m-%d')
          echo "Limpiando backups anteriores a: $CUTOFF"
          aws s3 ls s3://entregax-uploads/db-backups/ | while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $4}' | grep -oP '\d{4}-\d{2}-\d{2}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Eliminando: $FILE_NAME"
              aws s3 rm "s3://entregax-uploads/db-backups/$FILE_NAME"
            fi
          done
