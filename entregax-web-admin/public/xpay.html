<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pagar a proveedor · EntregaX X-Pay</title>
  <style>
    :root { --brand: #C1272D; --brand2: #F05A28; --ink: #1F2430; --muted: #6B7280; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #FFF3EE 0%, #F6F7F9 55%, #F1F2F5 100%);
      color: var(--ink); display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .card {
      background: #FFFFFF; border: 1px solid #EFEFF3; border-radius: 22px;
      box-shadow: 0 12px 40px rgba(31,36,48,0.10);
      padding: 30px 24px 26px; max-width: 400px; width: 100%;
    }
    .logo { width: 190px; max-width: 70%; height: auto; margin: 2px auto 18px; display: block; }
    h1 { font-size: 22px; margin: 4px 0 6px; font-weight: 800; }
    p { font-size: 15px; color: var(--muted); margin: 0 0 22px; line-height: 1.45; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px 16px; margin: 10px 0; border-radius: 14px;
      font-size: 16px; font-weight: 700; text-decoration: none; border: none; cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--brand) 0%, var(--brand2) 100%); color: #fff;
      box-shadow: 0 8px 20px rgba(240,90,40,0.28); }
    .btn-ghost { background: #fff; color: var(--brand); border: 1.5px solid rgba(193,39,45,0.35); }
    .stores { display: flex; gap: 10px; margin-top: 16px; }
    .store {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 8px; border-radius: 13px; background: #111418; color: #fff;
      text-decoration: none; font-weight: 600; font-size: 13px;
    }
    .store svg { width: 20px; height: 20px; flex: none; }
    .store small { display: block; font-size: 9px; font-weight: 500; opacity: 0.75; line-height: 1; margin-bottom: 1px; }
    .store b { font-size: 14px; font-weight: 700; line-height: 1.1; }
    .foot { margin-top: 18px; font-size: 12px; color: #9AA0AB; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/instrucciones-logo.png" alt="EntregaX" />
    <h1>💱 Paga a tu proveedor</h1>
    <p>Ábrelo en la app de EntregaX para pagar a tus proveedores en China con X-Pay.</p>

    <a id="openApp" class="btn btn-primary" href="#">Hacer un pago a proveedor</a>
    <a class="btn btn-ghost" href="https://www.entregax.app">Ir al sitio web</a>

    <div class="stores">
      <a id="appStore" class="store" href="https://apps.apple.com/mx/search?term=entregax">
        <svg viewBox="0 0 384 512" fill="#fff" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        <span><small>Descárgala en</small><b>App Store</b></span>
      </a>
      <a id="playStore" class="store" href="https://play.google.com/store/apps/details?id=com.entregax.mobile">
        <svg viewBox="0 0 512 512" aria-hidden="true">
          <path fill="#00E0FF" d="M47.9 24.9C43.6 29.4 41 36.4 41 45.5v421c0 9.1 2.6 16.1 6.9 20.6l1.4 1.3 235.9-235.9v-5.6L49.3 23.6z"/>
          <path fill="#FFCE00" d="M363.6 335.1l-78.6-78.6v-5.6l78.7-78.7 1.8 1 93.2 52.9c26.6 15.1 26.6 39.9 0 55.1l-93.2 52.9z"/>
          <path fill="#FF3A44" d="M365.4 334.1 285 253.7 47.9 486.8c8.8 9.3 23.3 10.4 39.7 1.2l277.8-153.9"/>
          <path fill="#00F076" d="M365.4 173.3 87.6 19.5C71.2 10.2 56.7 11.4 47.9 20.7L285 253.7z"/>
        </svg>
        <span><small>Disponible en</small><b>Google Play</b></span>
      </a>
    </div>

    <div class="foot">Si tienes la app instalada, se abrirá automáticamente.</div>
  </div>

  <script>
    (function () {
      var schemeLink = 'entregax://xpay';
      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);

      // Android: intent:// es lo más confiable desde navegadores in-app (incluye
      // fallback a Play Store si la app no está instalada). iOS: esquema directo.
      var androidIntent =
        'intent://xpay#Intent;scheme=entregax;package=com.entregax.mobile;' +
        'S.browser_fallback_url=' +
        encodeURIComponent('https://play.google.com/store/apps/details?id=com.entregax.mobile') +
        ';end';
      var deepLink = isAndroid ? androidIntent : schemeLink;

      var openBtn = document.getElementById('openApp');
      openBtn.setAttribute('href', deepLink);
      openBtn.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      });

      if (isAndroid) {
        setTimeout(function () {
          try { window.location.href = deepLink; } catch (err) {}
        }, 350);
      }
    })();
  </script>
</body>
</html>
